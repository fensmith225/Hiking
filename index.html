<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Hiking Training Plan</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7f4; color: #1a1a18; padding-bottom: 4rem; }
#topbar { background: #fff; border-bottom: 1px solid rgba(0,0,0,0.1); padding: 14px 16px 10px; position: sticky; top: 0; z-index: 50; }
#topbar h1 { font-size: 17px; font-weight: 600; }
#topbar p { font-size: 12px; color: #6b6b66; margin-top: 2px; }
#prow { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
#ptrack { flex: 1; height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; overflow: hidden; }
#pfill { height: 100%; background: #185FA5; border-radius: 2px; transition: width .4s; }
#plabel { font-size: 12px; color: #6b6b66; white-space: nowrap; }
#wnav { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; background: #fff; border-bottom: 1px solid rgba(0,0,0,0.1); }
#wnav::-webkit-scrollbar { display: none; }
.wb { flex-shrink: 0; padding: 6px 13px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.1); background: #f8f7f4; color: #6b6b66; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
.wb.act { background: #185FA5; border-color: #185FA5; color: #fff; }
.wb.fin { background: #3B6D11; border-color: #3B6D11; color: #fff; }
#mc { padding: 14px; }
.tip { border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
.tipb { background: #E6F1FB; color: #0C447C; }
.tipg { background: #EAF3DE; color: #27500A; }
.wcard { background: #fff; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 12px; }
.wbadge { font-size: 11px; font-weight: 600; background: #EAF3DE; color: #27500A; padding: 2px 9px; border-radius: 10px; }
.wprog { font-size: 12px; color: #6b6b66; }
.circle { width: 30px; height: 30px; min-width: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0; font-family: inherit; -webkit-tap-highlight-color: transparent; -webkit-appearance: none; appearance: none; border: 2px solid #ccc; background: transparent; }
.nbtn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 16px; border: 1px solid #185FA5; background: transparent; color: #185FA5; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; margin-top: 8px; margin-left: 40px; }
.nta { display: none; width: calc(100% - 40px); margin-left: 40px; margin-top: 8px; padding: 8px 10px; border: 1px solid rgba(0,0,0,0.15); border-radius: 8px; font-size: 13px; font-family: inherit; color: #1a1a18; background: #f8f7f4; resize: none; line-height: 1.5; min-height: 68px; }
.nta:focus { outline: none; border-color: #185FA5; }
.navrow { display: flex; gap: 8px; margin-top: 4px; }
.navbtn { flex: 1; padding: 11px; background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; color: #6b6b66; font-size: 13px; cursor: pointer; font-family: inherit; }
.statrow { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.statcard { background: #fff; border-radius: 10px; padding: 12px 14px; border: 1px solid rgba(0,0,0,0.1); }
.mcard { background: #fff; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 12px; align-items: flex-start; }
.micon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
.resetbtn { width: 100%; margin-top: 20px; padding: 10px; background: none; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; color: #6b6b66; font-size: 13px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div id="topbar">
  <h1>&#127956; Hiking training plan</h1>
  <p>Norway 12 Jul &nbsp;&middot;&nbsp; Pyrenees 25 Aug</p>
  <div id="prow">
    <div id="ptrack"><div id="pfill" style="width:0%"></div></div>
    <span id="plabel">0 / 0 done</span>
  </div>
</div>
<div id="wnav"></div>
<div id="mc"></div>
<script>
var SK='hk10s', NK='hk10n', mem={};
function sg(k){try{var v=localStorage.getItem(k);if(v!=null)return v;}catch(e){}return mem[k]||null;}
function ss(k,v){try{localStorage.setItem(k,v);}catch(e){}mem[k]=v;}
function sd(k){try{localStorage.removeItem(k);}catch(e){}delete mem[k];}
var S={}, N={};
function load(){try{S=JSON.parse(sg(SK)||'{}')}catch(e){S={}}try{N=JSON.parse(sg(NK)||'{}')}catch(e){N={}}}
function saveS(){ss(SK,JSON.stringify(S));}
function saveN(){ss(NK,JSON.stringify(N));}

var TAGCSS={
  strength:'background:#FAEEDA;color:#633806',
  hiit:'background:#EEEDFE;color:#3C3489',
  step:'background:#E1F5EE;color:#085041',
  hill:'background:#FAECE7;color:#712B13',
  hike:'background:#E6F1FB;color:#0C447C',
  yoga:'background:#EAF3DE;color:#27500A',
  rest:'background:#F1EFE8;color:#444441',
  walk:'background:#F1EFE8;color:#444441',
  travel:'background:#FAECE7;color:#712B13',
  swim:'background:#E1F5EE;color:#085041'
};

var W=[
{id:'ov',nav:'Overview',label:'Overview',type:'overview'},
{id:'w1',nav:'W1',label:'Week 1',phase:'Phase 1 - Foundation',dates:'w/c 19 May',title:'Introduce step sessions',note:'Keep everything you already do. Add step machine on Tuesdays and a hilly walk after your big Saturday.',s:[
  {d:'Mon eve',n:'Strength',t:'strength',x:'Your usual strength session. Add weighted step-ups and Bulgarian split squats if not already.'},
  {d:'Tue',n:'Step machine',t:'step',x:'2x15 min on stair machine. Moderate pace, steady effort. Your new Tuesday add-on.'},
  {d:'Wed eve',n:'HIIT',t:'hiit',x:'Your usual HIIT session.'},
  {d:'Thu eve',n:'HIIT',t:'hiit',x:'Your usual HIIT session.'},
  {d:'Fri',n:'Easy walk or rest',t:'walk',x:'Recovery day. Commute walking is plenty.'},
  {d:'Sat',n:'HIIT + strength + hilly walk',t:'hiit',x:'Big Saturday as usual, then 60 min hilly walk at Crystal Palace or One Tree Hill. Your elevation intro.'},
  {d:'Sun',n:'Yoga + stair climb',t:'yoga',x:'Yoga as usual. If time allows add 10 min stair climbing at easy pace.'},
]},
{id:'w2',nav:'W2',label:'Week 2',phase:'Phase 1 - Foundation',dates:'w/c 26 May',title:'Add hill session',note:'Step sessions extend to 20 min. Thursday becomes a dedicated hill session.',s:[
  {d:'Mon eve',n:'Strength',t:'strength',x:'Add calf raises and glute bridges - both protect knees on descents.'},
  {d:'Tue',n:'Step machine',t:'step',x:'2x20 min. Increase resistance slightly from week 1.'},
  {d:'Wed eve',n:'HIIT',t:'hiit',x:'Your usual HIIT.'},
  {d:'Thu eve',n:'Hill session',t:'hill',x:'30-40 min hill repeats. Find a slope and go up and down 4-6 times or run a hilly loop.'},
  {d:'Fri',n:'Rest or easy walk',t:'rest',x:'Let legs recover before Saturday.'},
  {d:'Sat',n:'HIIT + strength + hike',t:'hike',x:'Big Saturday session then a proper hike - aim for 12-14 km with some ascent.'},
  {d:'Sun',n:'Yoga + stair climb',t:'yoga',x:'Yoga as usual. 10-15 min stair climbing if legs allow.'},
]},
{id:'w3',nav:'W3',label:'Week 3',phase:'Phase 1 - Foundation',dates:'w/c 2 Jun',title:'Build to 25 min step',note:'Step sessions grow. Strength gets hiking-specific exercises. Saturday hike targets 250-300m ascent.',s:[
  {d:'Mon eve',n:'Strength',t:'strength',x:'Weighted step-ups on a bench (3x12 each leg). Lateral band walks. Single-leg calf raises.'},
  {d:'Tue',n:'Step machine',t:'step',x:'2x25 min. Increase resistance. Keep pace without holding the rails.'},
  {d:'Wed eve',n:'HIIT',t:'hiit',x:'HIIT as usual.'},
  {d:'Thu eve',n:'Hill session',t:'hill',x:'40 min. Longer repeats - power-hike the ups, control the downs.'},
  {d:'Fri',n:'Rest or easy walk',t:'rest',x:'Recovery. Legs need it before a big Saturday.'},
  {d:'Sat',n:'HIIT + strength + hike',t:'hike',x:'Saturday sessions then hike 14-16 km with 250-300m ascent. One Tree Hill laps or North Downs.'},
  {d:'Sun',n:'Yoga + stair climb',t:'yoga',x:'Yoga. 15 min stair climb, easy pace.'},
]},
{id:'w4',nav:'W4',label:'Week 4',phase:'Phase 1 - Deload',dates:'w/c 9 Jun',title:'Deload - arrive fresh',note:'Pull back volume. Keep the pattern but reduce intensity. Legs should feel springy by the weekend.',s:[
  {d:'Mon eve',n:'Strength (light)',t:'strength',x:'Reduce load by 20%. Focus on mobility - hip flexors, ankles, thoracic rotation.'},
  {d:'Tue',n:'Step machine (easy)',t:'step',x:'2x15 min at easy effort. Just keep the habit.'},
  {d:'Wed eve',n:'HIIT (moderate)',t:'hiit',x:'Lighter effort - about 70% of usual intensity.'},
  {d:'Thu eve',n:'Easy hilly walk',t:'walk',x:'40 min brisk walk with some incline. Not a workout - just keep legs moving.'},
  {d:'Fri',n:'Rest',t:'rest',x:'Full rest or a very easy 20 min walk. Pack your bag.'},
  {d:'Sat',n:'Short hike 8-10 km',t:'hike',x:'Easy, flat-ish. Test your boots and kit. Legs should feel fresh.'},
  {d:'Sun',n:'Yoga only',t:'yoga',x:'Yoga only - no stair climbing. Save the legs for Norway.'},
]},
{id:'nor',nav:'Norway',label:'Norway',phase:'12-17 July',title:'Norway - 450m gain per day',type:'trip',tc:'b',note:'This IS training. Days of real hills will do more for your legs than any gym. Enjoy every minute.',s:[
  {d:'Sun 12 Jul',n:'Travel to Norway',t:'travel',x:'Travel day. Easy walking, stay hydrated, feet up on the plane.'},
  {d:'Mon-Wed',n:'Hike 450m per day',t:'hike',x:'Steady pace. Poles if you have them. Eat and drink well. This is the best training you can do.'},
  {d:'Each eve',n:'Stretch and rest',t:'rest',x:'Gentle stretching, legs elevated if possible. No extra workouts needed.'},
  {d:'Thu 17 Jul',n:'Yoga (morning) then travel home',t:'yoga',x:'Yoga in the morning as planned. Then travel back. Easy day - legs will be tired and grateful.'},
]},
{id:'nfk',nav:'Norfolk',label:'Norfolk',phase:'18-20 July - Retreat',title:'Norfolk yoga retreat',type:'retreat',tc:'g',note:'Active recovery. Let your body absorb the Norway training. Three days of yoga bridges you into the Pyrenees build.',s:[
  {d:'Fri 18 Jul eve',n:'Travel then Vinyasa',t:'yoga',x:'Travel up to Norfolk, settle in. Evening vinyasa. Easy, no pressure.'},
  {d:'Sat 19 Jul am',n:'Vinyasa (morning)',t:'yoga',x:'Morning vinyasa. Let your body move freely after the Norway week.'},
  {d:'Sat 19 Jul pm',n:'Yin (afternoon)',t:'yoga',x:'Afternoon yin - perfect for tired hiking legs. Deep hip and hamstring release.'},
  {d:'Sat 19 Jul',n:'Swimming if available',t:'swim',x:'If swimming is available go for it - gentle, no thrashing. Brilliant active recovery. Log it in the note box.'},
  {d:'Sun 20 Jul',n:'Practice then travel home',t:'yoga',x:'Morning practice. Travel home Sunday afternoon. You will arrive back feeling restored.'},
]},
{id:'w5',nav:'W5',label:'Week 5',phase:'Phase 2 - Pyrenees build',dates:'w/c 21 Jul',title:'Back to routine - ease in',note:'Norway and Norfolk will have left you well recovered. Ease back in with fresh legs.',s:[
  {d:'Mon eve',n:'Strength',t:'strength',x:'Return to full strength. Note how your legs feel post-Norway - likely noticeably stronger.'},
  {d:'Tue',n:'Step machine',t:'step',x:'2x25 min. Pick up where you left off. Add resistance if it feels easy.'},
  {d:'Wed eve',n:'HIIT',t:'hiit',x:'Full HIIT back in.'},
  {d:'Thu eve',n:'Hill session',t:'hill',x:'40 min hill repeats. Notice how much easier this feels after Norway.'},
  {d:'Fri',n:'Rest',t:'rest',x:'Rest.'},
  {d:'Sat',n:'HIIT + strength + hike with rucksack',t:'hike',x:'Start adding rucksack weight - 5 kg. Hike 14 km. Key new variable for Pyrenees prep.'},
  {d:'Sun',n:'Yoga + stair climb',t:'yoga',x:'Yoga. 15 min stair climb.'},
]},
{id:'w6',nav:'W6',label:'Week 6',phase:'Phase 2 - Pyrenees build',dates:'w/c 28 Jul',title:'Elevation focus',note:'Step sessions extend to 35-40 min continuous. Rucksack weight increases. Hardest week of the plan.',s:[
  {d:'Mon eve',n:'Strength',t:'strength',x:'Weighted step-ups (heavier), Bulgarian split squats, calf raises, lateral band walks.'},
  {d:'Tue',n:'Step machine',t:'step',x:'35-40 min continuous. Increase resistance. Do not hold the rails - it should feel hard.'},
  {d:'Wed eve',n:'HIIT',t:'hiit',x:'Full HIIT.'},
  {d:'Thu eve',n:'Hill session',t:'hill',x:'45-50 min hill repeats. Longer reps, shorter rest. Power-hike the ups, control the downs.'},
  {d:'Fri',n:'Rest',t:'rest',x:'Rest. Big Saturday ahead.'},
  {d:'Sat',n:'HIIT + strength + long hike',t:'hike',x:'Saturday sessions then 18-20 km with 6-7 kg rucksack. One Tree Hill repeat laps - each ascent about 60m so 5-6 laps gives 300m+ gain.'},
  {d:'Sun',n:'Yoga + stair climb',t:'yoga',x:'Yoga. 20 min stair climb.'},
]},
{id:'w7',nav:'W7',label:'Week 7',phase:'Phase 2 - Peak week',dates:'w/c 4 Aug',title:'Peak week - 600m hike',note:'Marker week. 45 min continuous step and a 600m ascent hike with 8 kg pack. If you can do this the Pyrenees is yours.',s:[
  {d:'Mon eve',n:'Strength',t:'strength',x:'Heavy step-ups and split squats. Last hard strength week.'},
  {d:'Tue',n:'Step machine - marker session',t:'step',x:'45 min continuous. Your benchmark. Note the resistance level and how you feel.'},
  {d:'Wed eve',n:'HIIT',t:'hiit',x:'Full HIIT.'},
  {d:'Thu eve',n:'Hill session',t:'hill',x:'50 min. Longest hill session of the plan. Trail run or long hill repeats.'},
  {d:'Fri',n:'Easy walk only',t:'walk',x:'Rest legs before Saturday peak hike.'},
  {d:'Sat',n:'HIIT + strength + peak hike',t:'hike',x:'Saturday sessions then 8 kg rucksack at One Tree Hill - 8-10 laps to hit 500-600m total gain. Your Pyrenees dress rehearsal.'},
  {d:'Sun',n:'Yoga + light stair climb',t:'yoga',x:'Gentle yoga. 10 min easy stair climbing only - recovery.'},
]},
{id:'w8',nav:'W8',label:'Week 8',phase:'Phase 2 - Taper',dates:'w/c 18 Aug',title:'Taper - arrive fresh',note:'Pull right back. You have built all the fitness you need. Arrive in Spain with fresh springy legs.',s:[
  {d:'Mon eve',n:'Strength (light)',t:'strength',x:'Mobility focus - hip flexors, ankles, glutes. No heavy loading.'},
  {d:'Tue',n:'Step machine (easy)',t:'step',x:'20 min easy. Keep the movement pattern, no effort.'},
  {d:'Wed eve',n:'HIIT (light)',t:'hiit',x:'60-70% effort only.'},
  {d:'Thu eve',n:'Easy walk',t:'walk',x:'40 min hilly walk. Comfortable pace.'},
  {d:'Fri',n:'Rest',t:'rest',x:'Full rest. Start packing.'},
  {d:'Sat',n:'Easy 10 km hike',t:'hike',x:'Flat-ish, 2-3 kg pack. Legs should feel powerful. Enjoy feeling very fit.'},
  {d:'Sun',n:'Yoga only',t:'yoga',x:'Yoga. No stair climb. Save everything for the Pyrenees.'},
]},
{id:'pyr',nav:'Pyrenees',label:'Pyrenees',phase:'25 Aug onwards',title:'Pyrenees - 1000m gain per day',type:'trip',tc:'b',note:'You have done the work. Trust your training. A sustainable pace - not fast - is everything at 1000m per day.',s:[
  {d:'Each day',n:'Hike 1000m ascent',t:'hike',x:'Slow and steady on the ascent. Poles essential. Take your time on descents - knees take the most punishment. Eat and drink constantly.'},
  {d:'Evenings',n:'Recovery',t:'rest',x:'Stretch calves, quads and hip flexors. Legs elevated. Cold water if available. Sleep as much as you can.'},
]},
];

function totalS(){var c=0;W.forEach(function(w){if(w.s)c+=w.s.length;});return c;}
function doneS(){var c=0;Object.keys(S).forEach(function(k){if(S[k])c++;});return c;}
function updP(){
  var t=totalS(),d=doneS(),p=t?Math.round(d/t*100):0;
  document.getElementById('pfill').style.width=p+'%';
  document.getElementById('plabel').textContent=d+' / '+t+' done';
}
function wDone(w){if(!w.s)return{d:0,t:0};var d=0;for(var i=0;i<w.s.length;i++){if(S[w.id+'_'+i])d++;}return{d:d,t:w.s.length};}

var cur=0;

function buildNav(){
  var nav=document.getElementById('wnav');nav.innerHTML='';
  for(var i=0;i<W.length;i++){(function(wi){
    var b=document.createElement('button');
    b.className='wb'+(wi===cur?' act':'');
    b.textContent=W[wi].nav;
    var r=wDone(W[wi]);
    if(r.d===r.t&&r.t>0)b.classList.add('fin');
    b.onclick=function(){show(wi);};
    nav.appendChild(b);
  })(i);}
}

function makeCircle(ticked){
  var btn=document.createElement('button');
  btn.type='button';
  btn.className='circle';
  btn.style.background=ticked?'#3B6D11':'transparent';
  btn.style.borderColor=ticked?'#3B6D11':'#ccc';
  if(ticked){
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 12 12');
    svg.setAttribute('width','13');svg.setAttribute('height','13');
    svg.style.cssText='fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:block;';
    var pl=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    pl.setAttribute('points','1.5,6 4.5,9.5 10.5,2.5');
    svg.appendChild(pl);btn.appendChild(svg);
  }
  return btn;
}

function el(tag,styles,text){
  var e=document.createElement(tag);
  if(styles)e.style.cssText=styles;
  if(text)e.textContent=text;
  return e;
}

function show(wi){
  cur=wi;var w=W[wi];buildNav();
  var mc=document.getElementById('mc');
  mc.innerHTML='';
  if(w.type==='overview'){buildOv(mc);updP();return;}

  var r=wDone(w);

  // Phase header
  var ph=el('div','margin-bottom:14px;');
  ph.appendChild(el('div','font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6b6b66;',w.phase));
  ph.appendChild(el('div','font-size:18px;font-weight:600;margin-top:3px;',w.title));
  if(w.dates) ph.appendChild(el('div','font-size:12px;color:#6b6b66;margin-top:2px;',w.dates));
  if(w.type!=='trip'&&w.type!=='retreat') ph.appendChild(el('div','font-size:13px;color:#6b6b66;margin-top:6px;line-height:1.55;',w.note));
  mc.appendChild(ph);

  // Tip banner for trips
  if(w.type==='trip'||w.type==='retreat'){
    var tip=el('div','border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.6;'+(w.tc==='g'?'background:#EAF3DE;color:#27500A;':'background:#E6F1FB;color:#0C447C;'),w.note);
    mc.appendChild(tip);
  }

  // Week card
  var card=el('div','background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,0.1);overflow:hidden;margin-bottom:12px;');

  // Card header
  var hdr=el('div','display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid rgba(0,0,0,0.1);font-size:14px;font-weight:600;');
  hdr.id='whdr';
  hdr.appendChild(el('span','',w.label));
  var hb=el('span','');
  if(r.d===r.t&&r.t>0){hb.className='wbadge';hb.textContent='Done';}
  else{hb.className='wprog';hb.textContent=r.d+'/'+r.t;}
  hdr.appendChild(hb);
  card.appendChild(hdr);

  // Sessions
  (w.s||[]).forEach(function(s,i){
    var key=w.id+'_'+i, nk='nk_'+key;
    var sv=N[nk]||'', hasN=sv.trim().length>0, ticked=!!S[key];

    var item=el('div','border-bottom:1px solid rgba(0,0,0,0.07);padding:12px 14px 10px;');

    // Circle + text row
    var row=el('div','display:flex;align-items:flex-start;gap:10px;');

    var cbWrap=el('div','');
    cbWrap.setAttribute('data-cbkey',key);
    var cb=makeCircle(ticked);
    cb.onclick=(function(k,wii){return function(){doTick(k,wii);};})(key,wi);
    cbWrap.appendChild(cb);
    row.appendChild(cbWrap);

    // Text — plain elements, no classes, pure inline styles
    var txt=el('div','flex:1;min-width:0;');
    txt.appendChild(el('div','font-size:12px;color:#6b6b66;font-weight:500;margin-bottom:2px;',s.d));
    var tag=el('span','display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;margin-bottom:3px;'+(TAGCSS[s.t]||TAGCSS.rest)+';',s.t);
    txt.appendChild(tag);
    txt.appendChild(el('div','font-size:14px;font-weight:600;color:#1a1a18;margin-bottom:3px;',s.n));
    txt.appendChild(el('div','font-size:13px;color:#6b6b66;line-height:1.5;',s.x));
    row.appendChild(txt);
    item.appendChild(row);

    // Note button and textarea
    var nb=el('button','','Add a note');
    nb.type='button';nb.className='nbtn';
    if(hasN)nb.textContent='Note saved - tap to edit';
    var ta=el('textarea','');
    ta.className='nta';
    ta.placeholder='Variations, how it felt, substitutions...';
    if(hasN){ta.value=sv;ta.style.display='block';}
    nb.onclick=(function(nk2,t2,nb2){return function(){doNote(nk2,t2,nb2);};})(nk,ta,nb);
    ta.oninput=(function(nk2,t2,nb2){return function(){onIn(nk2,t2,nb2);};})(nk,ta,nb);
    item.appendChild(nb);
    item.appendChild(ta);
    card.appendChild(item);
  });

  mc.appendChild(card);

  // Back / next
  if(wi>0&&wi<W.length-1){
    var nr=el('div','display:flex;gap:8px;margin-top:4px;');
    var bp=el('button','','Back: '+W[wi-1].label);bp.type='button';bp.className='navbtn';
    bp.onclick=(function(x){return function(){show(x);};})(wi-1);
    var bn=el('button','','Next: '+W[wi+1].label);bn.type='button';bn.className='navbtn';
    bn.onclick=(function(x){return function(){show(x);};})(wi+1);
    nr.appendChild(bp);nr.appendChild(bn);mc.appendChild(nr);
  }
  updP();
}

function doTick(key,wi){
  S[key]=!S[key];saveS();
  var cbWrap=document.querySelector('[data-cbkey="'+key+'"]');
  if(cbWrap){
    cbWrap.innerHTML='';
    var nb=makeCircle(!!S[key]);
    nb.onclick=(function(k,wii){return function(){doTick(k,wii);};})(key,wi);
    cbWrap.appendChild(nb);
  }
  var w=W[wi],r=wDone(w),hdr=document.getElementById('whdr');
  if(hdr){
    var sp=hdr.querySelectorAll('span');
    if(sp[1]){
      if(r.d===r.t&&r.t>0){sp[1].className='wbadge';sp[1].textContent='Done';}
      else{sp[1].className='wprog';sp[1].textContent=r.d+'/'+r.t;}
    }
  }
  buildNav();updP();
}

function doNote(nk,ta,nb){
  var open=ta.style.display==='block';
  if(open){ta.style.display='none';nb.textContent=(N[nk]||'').trim().length?'Note saved - tap to edit':'Add a note';}
  else{ta.style.display='block';ta.focus();nb.textContent='Close note';}
}
function onIn(nk,ta,nb){N[nk]=ta.value;saveN();nb.textContent='Close note';}

function buildOv(mc){
  var d=doneS(),t=totalS(),p=t?Math.round(d/t*100):0;
  var ph=el('div','margin-bottom:14px;');
  ph.appendChild(el('div','font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6b6b66;','Your programme'));
  ph.appendChild(el('div','font-size:18px;font-weight:600;margin-top:3px;','Norway and Pyrenees 2025'));
  ph.appendChild(el('div','font-size:13px;color:#6b6b66;margin-top:6px;line-height:1.55;','Tap a week tab above. Tap the circle to mark a session done. Tap Add a note to log what happened.'));
  mc.appendChild(ph);

  var sr=el('div','');sr.className='statrow';
  var sc1=el('div','');sc1.className='statcard';
  sc1.appendChild(el('div','font-size:11px;color:#6b6b66;font-weight:500;','Sessions done'));
  sc1.appendChild(el('div','font-size:24px;font-weight:700;margin-top:2px;color:#185FA5;',''+d));
  var sc2=el('div','');sc2.className='statcard';
  sc2.appendChild(el('div','font-size:11px;color:#6b6b66;font-weight:500;','Progress'));
  sc2.appendChild(el('div','font-size:24px;font-weight:700;margin-top:2px;color:#3B6D11;',''+p+'%'));
  sr.appendChild(sc1);sr.appendChild(sc2);mc.appendChild(sr);

  mc.appendChild(el('div','border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.6;background:#E6F1FB;color:#0C447C;','Your existing routine - strength Mon, HIIT Wed and Thu, big Saturday, yoga Sunday - is the backbone. This plan slots elevation training into the gaps.'));

  mc.appendChild(el('div','font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6b6b66;margin-bottom:8px;','Key milestones'));

  [{icon:'&#9968;',bg:'#E6F1FB',h:'12 July - Norway (travel Sun 12)',p:'450m gain per day. Target: comfortable at 30 min step sessions and a hilly 14 km hike before you go.'},
   {icon:'&#129335;',bg:'#EAF3DE',h:'18-20 July - Norfolk retreat',p:'Active recovery. Vinyasa, yin, morning practice, swimming if available.'},
   {icon:'&#127956;',bg:'#FAECE7',h:'25 August - Pyrenees',p:'1000m gain per day. Target: 45 min continuous step, 8 kg rucksack, strong knees.'}
  ].forEach(function(m){
    var mc2=el('div','');mc2.className='mcard';
    var mi=el('div','');mi.className='micon';mi.style.background=m.bg;mi.innerHTML=m.icon;
    var mb=el('div','flex:1;min-width:0;');
    mb.appendChild(el('div','font-size:14px;font-weight:600;margin-bottom:3px;',m.h));
    mb.appendChild(el('div','font-size:12px;color:#6b6b66;line-height:1.5;',m.p));
    mc2.appendChild(mi);mc2.appendChild(mb);mc.appendChild(mc2);
  });

  var rb=el('button','','Reset all progress and notes');rb.type='button';rb.className='resetbtn';
  rb.onclick=function(){if(confirm('Reset everything? Cannot be undone.')){sd(SK);sd(NK);S={};N={};buildNav();show(0);updP();}};
  mc.appendChild(rb);
}

load();buildNav();show(0);updP();
</script>
