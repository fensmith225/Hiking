<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a18;padding-bottom:4rem;}

.wb.act{background:#185FA5;border-color:#185FA5;color:#fff;}
.wb.fin{background:#3B6D11;border-color:#3B6D11;color:#fff;}
#mc{padding:14px;}
.circle{width:30px;height:30px;min-width:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;font-family:inherit;-webkit-tap-highlight-color:transparent;-webkit-appearance:none;appearance:none;border:2px solid #ccc;background:transparent;}
.nbtn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:16px;border:1px solid #185FA5;background:transparent;color:#185FA5;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;margin-top:8px;margin-left:40px;}
.nta{display:none;width:calc(100% - 40px);margin-left:40px;margin-top:8px;padding:8px 10px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a18;background:#f8f7f4;resize:none;line-height:1.5;min-height:68px;}
.nta:focus{outline:none;border-color:#185FA5;}
.navrow{display:flex;gap:8px;margin-top:4px;}
.navbtn{flex:1;padding:11px;background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:10px;color:#6b6b66;font-size:13px;cursor:pointer;font-family:inherit;}
.statrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.resetbtn{width:100%;margin-top:20px;padding:10px;background:none;border:1px solid rgba(0,0,0,0.1);border-radius:10px;color:#6b6b66;font-size:13px;cursor:pointer;font-family:inherit;}
</style>

function totalS(){var c=0;W.forEach(function(w){if(w.s)c+=w.s.length;});return c;}
function doneS(){var c=0;Object.keys(S).forEach(function(k){if(S[k])c++;});return c;}
function updP(){var t=totalS(),d=doneS(),p=t?Math.round(d/t*100):0;document.getElementById('pfill').style.width=p+'%';document.getElementById('plabel').textContent=d+' / '+t+' done';}
function wDone(w){if(!w.s)return{d:0,t:0};var d=0;for(var i=0;i<w.s.length;i++){if(S[w.id+'_'+i])d++;}return{d:d,t:w.s.length};}

function mkC(ticked){var btn=document.createElement('button');btn.type='button';btn.className='circle';btn.style.background=ticked?'#3B6D11':'transparent';btn.style.borderColor=ticked?'#3B6D11':'#ccc';if(ticked){var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox','0 0 12 12');svg.setAttribute('width','13');svg.setAttribute('height','13');svg.style.cssText='fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:block;';var pl=document.createElementNS('http://www.w3.org/2000/svg','polyline');pl.setAttribute('points','1.5,6 4.5,9.5 10.5,2.5');svg.appendChild(pl);btn.appendChild(svg);}return btn;}

var hdr=mk('div','display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid rgba(0,0,0,0.1);font-size:14px;font-weight:600;');
